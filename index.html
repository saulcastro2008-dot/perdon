<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1a1a1a, #3a0d2f);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

h1 {
    margin-top: 30px;
    font-size: 40px;
    color: #ff4d6d;
}

p {
    max-width: 600px;
    margin: auto;
    line-height: 1.6;
}

.galeria {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.galeria img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    margin: 10px;
    border-radius: 15px;
    transform: rotate(-3deg);
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.botones {
    margin-top: 30px;
}

button {
    padding: 15px 25px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    cursor: pointer;
    margin: 10px;
}

#si {
    background: #ff4d6d;
    color: white;
}

#no {
    background: gray;
    position: absolute;
}

</style>
</head>

<body>

<h1>Lo siento ❤️</h1>

<p>
Sé que la cagué… y no quiero hacer como si nada.<br>
Me importas demasiado y de verdad quiero arreglarlo.<br>
He pensado en todo y entendí lo que hice mal.<br><br>

No te pido que todo sea como antes de inmediato…<br>
solo una oportunidad para demostrarte que puedo hacerlo mejor.
</p>

<div class="galeria">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
    <img src="foto4.jpg">
    <img src="foto5.jpg">
    <img src="foto6.jpg">
</div>

<div class="botones">
    <button id="si" onclick="aceptar()">Sí, te perdono ❤️</button>
    <button id="no">No 😭</button>
</div>

<p id="respuesta" style="margin-top:20px; font-weight:bold;"></p>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mp3">
</audio>

<script>
const botonNo = document.getElementById("no");

botonNo.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    botonNo.style.left = x + "px";
    botonNo.style.top = y + "px";
});

function aceptar() {
    document.getElementById("respuesta").innerText = "Gracias por darme otra oportunidad 💖";
    document.getElementById("musica").play();
}
</script>

</body>
</html>
